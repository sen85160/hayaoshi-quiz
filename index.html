<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>早押しクイズバトル</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --purple-dark: #26215C;
  --purple-mid: #534AB7;
  --purple-light: #7F77DD;
  --purple-pale: #EEEDFE;
  --purple-accent: #AFA9EC;
  --gray-mid: #b0aad4;
  --gray-dark: #4a4570;
  --red: #e74c3c;
  --gold: #f0c040;
  --green: #27ae60;
  --shadow: 0 4px 24px rgba(83,74,183,0.13);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #1a1640 0%, #2d2870 50%, #1a1640 100%);
  min-height: 100vh;
  color: var(--purple-dark);
}

.screen { display: none !important; }
.screen.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
#gameScreen.active, #soloScreen.active, #waitingScreen.active { display: block !important; }

button {
  padding: 10px 20px; border: none; border-radius: var(--radius);
  background: var(--purple-mid); color: white;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
}
button:hover { background: var(--purple-dark); transform: translateY(-1px); }
button:disabled { background: var(--gray-mid); cursor: not-allowed; transform: none; }
button.ghost { background: transparent; border: 2px solid var(--purple-mid); color: var(--purple-mid); }
button.ghost:hover { background: var(--purple-pale); }

input, select {
  padding: 10px 14px; border: 2px solid var(--gray-mid); border-radius: var(--radius);
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
  background: white; color: var(--purple-dark); outline: none; transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--purple-mid); }

/* ===== タイトル ===== */
#titleScreen { text-align: center; }
.title-logo {
  font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 72px;
  letter-spacing: 4px; color: white; text-shadow: 0 0 40px rgba(175,169,236,0.6);
  margin-bottom: 4px; line-height: 1;
}
.title-sub { color: var(--purple-accent); font-size: 13px; letter-spacing: 3px; margin-bottom: 48px; }
.mode-buttons { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
.mode-card {
  background: rgba(255,255,255,0.08); border: 2px solid rgba(175,169,236,0.3);
  border-radius: 16px; padding: 28px 36px; cursor: pointer; transition: all 0.2s;
  color: white; text-align: center; min-width: 200px;
}
.mode-card:hover { background: rgba(175,169,236,0.15); border-color: var(--purple-accent); transform: translateY(-2px); }
.mode-card-icon { font-size: 40px; margin-bottom: 10px; }
.mode-card-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.mode-card-desc { font-size: 12px; color: var(--purple-accent); line-height: 1.5; }

/* ===== セットアップ ===== */
.setup-card {
  background: white; border-radius: 16px; padding: 32px;
  box-shadow: var(--shadow); width: 100%; max-width: 440px;
}
.setup-card h3 {
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 18px; color: var(--purple-dark);
  margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--purple-pale);
}
.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 13px; color: var(--gray-dark); margin-bottom: 6px; font-weight: 700; }
.form-row input { width: 100%; }
.radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
.radio-group input[type="radio"] { display: none; }
.radio-group label {
  padding: 8px 16px; border: 2px solid var(--purple-mid); border-radius: 50px;
  color: var(--purple-mid); cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s;
}
.radio-group input[type="radio"]:checked + label { background: var(--purple-mid); color: white; }
.start-btn { width: 100%; padding: 14px; font-size: 16px; border-radius: 50px; margin-top: 8px; background: linear-gradient(135deg, var(--purple-mid), var(--purple-light)); }
.back-btn { background: transparent; border: none; color: var(--purple-accent); font-size: 13px; cursor: pointer; margin-top: 12px; }
.back-btn:hover { color: white; background: transparent; transform: none; }

/* ===== 待機 ===== */
#waitingScreen { padding: 20px; max-width: 500px; margin: 0 auto; }
.waiting-card { background: white; border-radius: 16px; padding: 32px; box-shadow: var(--shadow); margin: 40px auto; max-width: 440px; }
.waiting-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; color: var(--purple-dark); margin-bottom: 16px; }
.room-key-display {
  background: var(--purple-pale); border: 2px dashed var(--purple-mid); border-radius: var(--radius);
  padding: 14px; font-size: 28px; font-weight: 900; color: var(--purple-dark);
  letter-spacing: 4px; margin-bottom: 16px; text-align: center;
}
.player-list { list-style: none; margin-bottom: 16px; }
.player-list li {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--purple-pale); border-radius: 8px; margin-bottom: 6px; font-weight: 700; color: var(--purple-dark);
}
.player-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--purple-light); }

/* 新しいレイアウト用CSS */
#gameScreen { padding: 10px; max-width: 1000px; margin: 0 auto; color: white; }
.game-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 5px; }
.game-main-container { display: flex; gap: 15px; align-items: flex-start; flex-wrap: wrap; }
.game-left-col { flex: 1.6; min-width: 300px; }
.game-right-col { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 12px; }

.question-card { background: white; border-radius: 12px; padding: 15px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); margin-bottom: 10px; }
.question-text { font-size: 1.1rem; font-weight: 700; line-height: 1.6; min-height: 60px; color: #26215C; }
.buzz-banner { border-radius: 12px; padding: 10px; margin-bottom: 10px; text-align: center; font-weight: 900; }

.players-status-card { background: white; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.player-status-box { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; border-radius: 8px; border: 1px solid #EEEDFE; color: #26215C; }
.psb-name { flex: 1; font-size: 13px; font-weight: 700; }
.psb-score { width: 50px; text-align: center; font-weight: 900; color: #534AB7; }
.psb-status { width: 70px; text-align: right; font-size: 11px; font-weight: 700; }
.answers-log-card { background: white; border-radius: 12px; padding: 10px; max-height: 180px; overflow-y: auto; color: #26215C; }


/* ===== 早押しバナー ===== */
.buzz-banner {
  border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px;
  text-align: center; font-family: 'Zen Maru Gothic', sans-serif; font-size: 18px; font-weight: 900;
  letter-spacing: 1px; transition: all 0.3s;
}
.buzz-banner.nobody { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 400; }
.buzz-banner.me { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
.buzz-banner.other { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; animation: banner-flash 0.4s ease-out; }
@keyframes banner-flash {
  0% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* ===== アクションエリア ===== */
.action-area { margin-bottom: 12px; }
.buzz-btn {
  width: 100%; padding: 20px; font-size: 22px; font-weight: 900; border-radius: 50px;
  background: linear-gradient(135deg, #e74c3c, #c0392b); letter-spacing: 2px;
  box-shadow: 0 6px 24px rgba(231,76,60,0.35); transition: all 0.15s;
}
.buzz-btn:hover:not(:disabled) { background: linear-gradient(135deg, #c0392b, #962d22); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(231,76,60,0.45); }
.buzz-btn:disabled { background: var(--gray-mid); box-shadow: none; }
.answer-card { background: white; border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); border: 2px solid var(--green); }
.answer-input-row { display: flex; gap: 8px; margin-top: 8px; }
.answer-input-row input { flex: 1; }
.surrender-row { display: flex; justify-content: center; margin-top: 8px; }
.surrender-btn { background: transparent; border: 1px solid var(--gray-mid); color: var(--gray-dark); font-size: 12px; padding: 6px 16px; border-radius: 50px; }
.surrender-btn:hover { background: #f8f8f8; color: var(--red); border-color: var(--red); transform: none; }
.locked-notice {
  background: #fffbe6; border: 1px solid #ffaa00; border-radius: var(--radius);
  padding: 12px 16px; color: #e67e22; font-weight: 700; font-size: 14px; text-align: center;
}
.waiting-answer-notice {
  background: #fff0f0; border: 1px solid var(--red); border-radius: var(--radius);
  padding: 12px 16px; text-align: center; font-weight: 700; font-size: 14px; color: var(--red);
}
.surrendered-notice {
  background: #f8f8f8; border: 1px solid var(--gray-mid); border-radius: var(--radius);
  padding: 12px 16px; color: var(--gray-mid); font-size: 14px; text-align: center;
}

/* ===== 回答ログ ===== */
.answers-log-card { background: white; border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); margin-bottom: 12px; }
.answers-log-title { font-size: 12px; color: var(--gray-dark); font-weight: 700; margin-bottom: 10px; }
.answer-log-row {
  display: flex; align-items: center; gap: 6px; padding: 6px 0;
  border-bottom: 1px solid var(--purple-pale); font-size: 14px;
}
.answer-log-row:last-child { border-bottom: none; }
.log-name { font-weight: 700; color: var(--purple-dark); min-width: 56px; flex-shrink: 0; }
.log-ans { flex: 1; color: var(--purple-dark); }
.log-mark { font-size: 16px; flex-shrink: 0; }

/* ===== リザルト ===== */
.result-overlay {
  display: none; position: fixed; inset: 0; background: rgba(26,22,64,0.85);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.result-overlay.show { display: flex; }
.result-box {
  background: white; border-radius: 20px; padding: 32px; max-width: 460px; width: 100%;
  text-align: center; box-shadow: 0 8px 48px rgba(83,74,183,0.3);
}
.result-label { font-size: 12px; color: var(--gray-mid); letter-spacing: 2px; margin-bottom: 8px; }
.result-status { font-family: 'Zen Maru Gothic', sans-serif; font-size: 48px; font-weight: 900; margin-bottom: 8px; }
.result-status.success { color: var(--green); }
.result-status.fail { color: var(--red); }
.result-answer { font-size: 16px; color: var(--gray-dark); margin-bottom: 10px; }
.result-winner { font-size: 15px; font-weight: 700; color: var(--purple-mid); margin-bottom: 16px; }
.result-scores { background: var(--purple-pale); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; text-align: left; }
.result-score-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px solid var(--purple-accent); }
.result-score-row:last-child { border-bottom: none; }
.result-score-name { font-weight: 700; color: var(--purple-dark); }
.result-score-num { font-weight: 700; color: var(--purple-mid); }
.result-next-btn { width: 100%; padding: 13px; font-size: 15px; border-radius: 50px; }
.result-waiting { color: var(--gray-mid); font-size: 13px; margin-top: 8px; }

/* ===== 最終スコア ===== */
#finalScreen.active { display: flex !important; }
.final-card { background: white; border-radius: 20px; padding: 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: var(--shadow); }
.final-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 32px; font-weight: 900; color: var(--purple-dark); margin-bottom: 20px; }
.final-winner-badge { background: linear-gradient(135deg, var(--gold), #e6a800); color: white; border-radius: 50px; padding: 10px 24px; font-size: 18px; font-weight: 700; margin-bottom: 20px; display: inline-block; }
.final-score-table { width: 100%; margin-bottom: 24px; border-collapse: collapse; }
.final-score-table th { font-size: 12px; color: var(--gray-dark); padding: 6px 10px; text-align: left; border-bottom: 2px solid var(--purple-pale); }
.final-score-table td { padding: 9px 10px; font-size: 15px; border-bottom: 1px solid var(--purple-pale); }
.final-rank { font-weight: 700; color: var(--purple-light); }
.final-name { font-weight: 700; color: var(--purple-dark); }
.final-pts { font-weight: 700; color: var(--purple-mid); font-size: 18px; }

/* ===== 一人で特訓 ===== */
#soloScreen { padding: 20px; max-width: 700px; margin: 0 auto; }
.solo-card { background: white; border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); margin: 30px auto; max-width: 600px; }
.solo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--purple-pale); padding-bottom: 12px; }
.solo-life { color: var(--red); font-size: 1.4rem; letter-spacing: 2px; }
.solo-question-area { font-size: 1.3rem; font-weight: 700; line-height: 1.8; min-height: 120px; margin-bottom: 20px; padding: 14px; background: var(--purple-pale); border-radius: 8px; color: var(--purple-dark); }
/* ===== 一人で特訓 アクションエリア ===== */
.solo-action-area { margin-bottom: 16px; }
/* 早押しボタン（通常時） */
.solo-buzz-btn {
  width: 100%; padding: 18px; font-size: 20px; font-weight: 900; border-radius: 50px;
  background: linear-gradient(135deg, #e74c3c, #c0392b); letter-spacing: 2px;
  box-shadow: 0 6px 24px rgba(231,76,60,0.35); transition: all 0.15s; color: white;
  border: none; cursor: pointer;
}
.solo-buzz-btn:hover:not(:disabled) { background: linear-gradient(135deg, #c0392b, #962d22); transform: translateY(-2px); }
.solo-buzz-btn:disabled { background: var(--gray-mid); box-shadow: none; cursor: not-allowed; transform: none; }
/* 降参ボタン（早押し前に表示） */
.solo-surrender-row { display: flex; justify-content: center; margin-top: 10px; }
/* 回答エリア（早押し後に表示） */
.solo-answer-card { background: white; border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); border: 2px solid var(--green); }
.solo-answer-label { font-size: 13px; color: var(--green); font-weight: 700; margin-bottom: 8px; }
.solo-controls { display: flex; gap: 12px; margin-top: 8px; }
.solo-controls input { flex: 1; font-size: 1.1rem; }
.solo-result-msg { min-height: 1.5rem; font-size: 1.1rem; font-weight: 700; text-align: center; margin-top: 8px; }
.solo-result-msg.success { color: var(--green); }
.solo-result-msg.error { color: var(--red); }
.solo-retry-btn { display: none; width: 100%; padding: 13px; font-size: 15px; border-radius: 50px; margin-top: 12px; background: linear-gradient(135deg, var(--purple-mid), var(--purple-light)); }

/* ===== オーバーレイ ===== */
#overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,64,0.7); z-index: 1000; align-items: center; justify-content: center; }
#overlay.show { display: flex; }
.overlay-box { background: white; border-radius: var(--radius); padding: 32px; text-align: center; min-width: 280px; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
.overlay-box p { font-size: 16px; font-weight: 700; color: var(--purple-dark); margin-bottom: 20px; }

.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>
<body>

<!-- タイトル -->
<div id="titleScreen" class="screen active">
  <div class="title-logo">早押しクイズ</div>
  <p class="title-sub">quick quiz battle</p>
  <div id="modeSelect">
    <div class="mode-buttons">
      <div class="mode-card" onclick="showOnlineSetup()">
        <div class="mode-card-title">オンライン対戦</div>
        <div class="mode-card-desc">友達と早押しバトル！</div>
      </div>
      <div class="mode-card" onclick="showSoloMode()">
        <div class="mode-card-title">一人で特訓</div>
        <div class="mode-card-desc">早押しして3ミス以内で正解！</div>
      </div>
    </div>
  </div>
  <div id="onlineSetup" style="display:none;">
    <div class="setup-card">
      <h3>オンライン対戦</h3>
      <div class="form-row">
        <label>あなたの名前</label>
        <input id="playerName" placeholder="名前を入力" maxlength="10">
      </div>
      <div class="form-row">
        <label>部屋の操作</label>
        <div class="radio-group">
          <input type="radio" name="roomAction" id="radioCreate" value="create">
          <label for="radioCreate" onclick="toggleRoomAction('create')">部屋を作る</label>
          <input type="radio" name="roomAction" id="radioJoin" value="join">
          <label for="radioJoin" onclick="toggleRoomAction('join')">部屋に入る</label>
        </div>
      </div>
      <div class="form-row">
        <label>合言葉</label>
        <input id="roomKeyInput" placeholder="合言葉を入力">
      </div>
      <div id="createSettings">
        <div class="form-row">
          <label>出題数</label>
          <div class="radio-group">
            <input type="radio" name="qCount" id="qc5" value="5"><label for="qc5">5問</label>
            <input type="radio" name="qCount" id="qc10" value="10"><label for="qc10">10問</label>
            <input type="radio" name="qCount" id="qc15" value="15"><label for="qc15">15問</label>
          </div>
        </div>
      </div>
      <button class="start-btn" onclick="startOnline()">スタート</button>
      <div style="text-align:center;"><button class="back-btn" onclick="backToTitle()">← 戻る</button></div>
    </div>
  </div>
</div>

<!-- 待機 -->
<div id="waitingScreen" class="screen">
  <div class="waiting-card">
    <div class="waiting-title" id="waitingTitle">参加者を待っています...</div>
    <div class="room-key-display" id="roomKeyDisplay"></div>
    <p style="font-size:12px;color:var(--gray-dark);margin-bottom:12px;text-align:center;">この合言葉を仲間に伝えよう</p>
    <ul class="player-list" id="playerListWaiting"></ul>
    <button id="startGameBtn" style="display:none;width:100%;border-radius:50px;padding:13px;" onclick="hostStartGame()">ゲーム開始</button>
    <button class="ghost" style="width:100%;margin-top:8px;border-radius:50px;" onclick="leaveRoom()">退出する</button>
  </div>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="screen">
  <div style="width:100%;">
    <div class="game-header">
      <div class="game-title"> Quiz Battle</div>
      <div class="badge" id="qNumBadge">Q1</div>
    </div>

    <div class="game-main-container">
      <div class="game-left-col">
        <div class="buzz-banner nobody" id="buzzBanner">問題文を読んでいます...</div>
        <div class="question-card">
          <span class="category-tag" id="onlineCatTag"></span>
          <div class="question-label" style="color:#b0aad4; font-size:10px;">QUESTION</div>
          <div class="question-text" id="onlineQuestionText"></div>
        </div>
        <div class="action-area" id="actionArea"></div>
      </div>

      <div class="game-right-col">
        <div class="players-status-card" id="playersStatusCard"></div>
        <div class="answers-log-card">
          <div style="font-size:11px; font-weight:700; margin-bottom:5px;">回答ログ</div>
          <div id="answersLog"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- リザルト -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-label">正解発表</div>
    <div id="resultQuestionFull" style="font-size:14px; color:#534AB7; font-weight:700; margin-bottom:15px; padding:10px; background:#f0f0ff; border-radius:8px; line-height:1.4; text-align:left;"></div>
    <div class="result-status" id="resultStatus"></div>
    <div class="result-answer" id="resultAnswer"></div>
    <div class="result-winner" id="resultWinner"></div>
    <div class="result-scores" id="resultScores"></div>
    <button class="result-next-btn" id="nextQuestionBtn" onclick="pressNextQuestion()">次の問題へ</button>
    <div class="result-waiting" id="resultWaiting"></div>
  </div>
</div>

<!-- 最終スコア -->
<div id="finalScreen" class="screen">
  <div class="final-card">
    <div class="final-title"> 最終結果</div>
    <div id="finalWinnerBadge"></div>
    <table class="final-score-table">
      <thead><tr><th>順位</th><th>名前</th><th>正解数</th></tr></thead>
      <tbody id="finalScoreTable"></tbody>
    </table>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button style="flex:1;border-radius:50px;padding:12px;" id="playAgainBtn" onclick="playAgain()">もう一度</button>
      <button class="ghost" style="flex:1;border-radius:50px;padding:12px;" onclick="backToTitle()">タイトルへ</button>
    </div>
    <div id="finalWaitMsg" style="font-size:12px;color:var(--gray-mid);margin-top:8px;text-align:center;"></div>
  </div>
</div>

<!-- 一人で特訓 -->
<div id="soloScreen" class="screen">
  <div style="max-width:640px;margin:0 auto;padding:20px;width:100%;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function selectQuestions(count) {
  let available = QUIZ_LIST.map((_, i) => i).filter(i => !usedIndicesOnline.includes(i));
  if (available.length < count) { usedIndicesOnline = []; available = QUIZ_LIST.map((_, i) => i); }
  let selectedIndices = shuffleArray(available).slice(0, count);
  usedIndicesOnline.push(...selectedIndices);
  return selectedIndices.map(i => QUIZ_LIST[i]);
}

/* ===== タイトル ===== */
function showOnlineSetup() {
  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('onlineSetup').style.display = 'block';
}
function backToTitle() {
  if (roomUnsubscribe) { roomUnsubscribe(); roomUnsubscribe = null; }
  stopCharReveal();
  soloStopReveal(); // ソロのタイマーも止める
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('modeSelect').style.display = 'block';
  document.getElementById('onlineSetup').style.display = 'none';
  showScreen('titleScreen');
}
function toggleRoomAction(action) {
  document.getElementById('createSettings').style.display = action === 'create' ? 'block' : 'none';
}

/* ===================================================
   一人で特訓モード（早押し形式に改修）
=================================================== */
let soloQuiz = {};
let soloDisplayIndex = 0;
let soloLives = 3;
let soloRevealInterval = null;  // 自動文字出しタイマー
let soloBuzzed = false;         // 早押し済みフラグ
let soloFinished = false;       // 問題終了フラグ

function showSoloMode() {
  showScreen('soloScreen');
  soloInitGame();
}

function soloInitGame() {
  // 未出題の問題番号を抽出
  let available = QUIZ_LIST.map((_, i) => i).filter(i => !usedIndicesSolo.includes(i));
  if (available.length === 0) { usedIndicesSolo = []; available = QUIZ_LIST.map((_, i) => i); }
  let randomIndex = available[Math.floor(Math.random() * available.length)];
  usedIndicesSolo.push(randomIndex);
  soloQuiz = QUIZ_LIST[randomIndex];

  soloDisplayIndex = 1;
  soloLives = 3;
  soloBuzzed = false;
  soloFinished = false;

  document.getElementById('soloAnswerInput') && document.getElementById('soloAnswerInput').remove && true;
  document.getElementById('soloCatTag').textContent = soloQuiz.cat;
  updateSoloLife();
  document.getElementById('soloResultMsg').textContent = '';
  document.getElementById('soloResultMsg').className = 'solo-result-msg';
  document.getElementById('soloRetryBtn').style.display = 'none';

  // アクションエリアを「早押しボタン＋降参」に戻す
  renderSoloBuzzState();

  // 問題文表示エリアをリセット
  document.getElementById('soloQuestionArea').textContent = soloQuiz.q.substring(0, 1);

  // 自動文字出し開始
  soloStartReveal();
}

/** 自動文字出しタイマー開始 */
function soloStartReveal() {
  soloStopReveal();
  if (soloDisplayIndex >= soloQuiz.q.length) return;
  soloRevealInterval = setInterval(() => {
    if (soloBuzzed || soloFinished) { soloStopReveal(); return; }
    if (soloDisplayIndex < soloQuiz.q.length) {
      soloDisplayIndex++;
      document.getElementById('soloQuestionArea').textContent = soloQuiz.q.substring(0, soloDisplayIndex);
    } else {
      soloStopReveal();
    }
  }, 750);
}

/** 自動文字出しタイマー停止 */
function soloStopReveal() {
  if (soloRevealInterval) { clearInterval(soloRevealInterval); soloRevealInterval = null; }
}

/** 早押し前の表示：早押しボタン＋降参ボタン */
function renderSoloBuzzState() {
  document.getElementById('soloActionArea').innerHTML = `
    <button class="solo-buzz-btn" id="soloBuzzBtn" onclick="soloPressbuzz()">⚡ 早押し！</button>
    <div class="solo-surrender-row">
      <button class="surrender-btn" onclick="soloPressSurrender()">🏳 降参する</button>
    </div>`;
}

/** 早押し後の表示：回答入力欄 */
function renderSoloAnswerState() {
  document.getElementById('soloActionArea').innerHTML = `
    <div class="solo-answer-card">
      <div class="solo-answer-label">⚡ 早押し！回答してください</div>
      <div class="solo-controls">
        <input id="soloAnswerInput" placeholder="答えを入力..." maxlength="30" autocomplete="off">
        <button onclick="soloCheckAnswer()">回答</button>
      </div>
    </div>`;
  setTimeout(() => {
    const inp = document.getElementById('soloAnswerInput');
    if (inp) {
      inp.focus();
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') soloCheckAnswer(); });
    }
  }, 50);
}

/** 早押しボタンが押されたとき */
function soloPressbuzz() {
  if (soloBuzzed || soloFinished) return;
  soloBuzzed = true;
  soloStopReveal(); // 文字出し停止（表示はその時点のまま）
  renderSoloAnswerState();
}

/** 降参ボタン */
function soloPressSurrender() {
  if (soloFinished) return;
  soloStopReveal();
  soloEndGame(false, true);
}

/** 回答チェック */
function soloCheckAnswer() {
  const inp = document.getElementById('soloAnswerInput');
  if (!inp) return;
  const ans = inp.value.trim();
  if (!ans) return;

  if (soloQuiz.a.includes(ans)) {
    soloEndGame(true);
    return;
  }

  // 不正解
  soloLives--;
  updateSoloLife();
  const card = document.querySelector('.solo-card');
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 400);

  if (soloLives <= 0) {
    soloEndGame(false);
    return;
  }

  // 不正解でライフ残あり → 早押し状態をリセットして文字出し再開
  const msg = document.getElementById('soloResultMsg');
  msg.textContent = `❌ 不正解！残り ${soloLives} 回`;
  msg.className = 'solo-result-msg error';

  soloBuzzed = false;
  renderSoloBuzzState(); // 早押しボタンを復活
  soloStartReveal();     // 文字出し再開
}

/** ゲーム終了 */
function soloEndGame(isWin, isSurrender = false) {
  soloFinished = true;
  soloStopReveal();
  // 問題文を全表示
  document.getElementById('soloQuestionArea').textContent = soloQuiz.q;
  // アクションエリアを無効化
  document.getElementById('soloActionArea').innerHTML = '';

  const msg = document.getElementById('soloResultMsg');
  if (isWin) {
    msg.textContent = `✅ 正解！ 答えは「${soloQuiz.a[0]}」でした。`;
    msg.className = 'solo-result-msg success';
  } else if (isSurrender) {
    msg.textContent = `🏳 降参！ 正解は「${soloQuiz.a[0]}」でした。`;
    msg.className = 'solo-result-msg error';
  } else {
    msg.textContent = `❌ 残念！ 正解は「${soloQuiz.a[0]}」でした。`;
    msg.className = 'solo-result-msg error';
  }
  document.getElementById('soloRetryBtn').style.display = 'block';
}

function updateSoloLife() {
  document.getElementById('soloLife').textContent = '❤️'.repeat(soloLives) + '🖤'.repeat(3 - soloLives);
}

/* ===== オンライン ===== */
function startOnline() {
  if (!window._db) { alert('初期化中です'); return; }
  myName = document.getElementById('playerName').value.trim();
  if (!myName) { alert('名前を入力してください'); return; }
  roomKey = document.getElementById('roomKeyInput').value.trim();
  if (!roomKey) { alert('合言葉を入力してください'); return; }
  myId = myName + '_' + Date.now();
  const action = document.querySelector('input[name="roomAction"]:checked')?.value;
  if (!action) { alert('部屋を作るか入るかを選択してください'); return; }
  if (action === 'create') createRoom(); else joinRoom();
}

function freshRoomState(questions) {
  return {
    phase: 'waiting', host: myId, totalQuestions,
    currentQIndex: 0,
    players: { [myId]: { name: myName, score: 0 } },
    questions: questions.map(q => ({ q: q.q, a: q.a, cat: q.cat })),
    answers: {}, resting: {}, locked: {}, surrendered: {}, buzzerId: '',
    revealIndex: 1, revealStopped: false, nextReady: {}
  };
}

function createRoom() {
  isHost = true;
  totalQuestions = parseInt(document.querySelector('input[name="qCount"]:checked')?.value || 10);
  const questions = selectQuestions(totalQuestions);
  window._set(window._ref(window._db, `quiz_rooms/${roomKey}`), freshRoomState(questions));
  showWaitingScreen(); listenRoom();
}

function joinRoom() {
  isHost = false;
  window._get(window._ref(window._db, `quiz_rooms/${roomKey}`)).then(snap => {
    if (!snap.exists()) { alert('部屋が見つかりません'); return; }
    const d = snap.val();
    if (d.phase !== 'waiting') { alert('すでにゲームが始まっています'); return; }
    totalQuestions = d.totalQuestions || 10;
    window._update(window._ref(window._db, `quiz_rooms/${roomKey}/players`), { [myId]: { name: myName, score: 0 } });
    showWaitingScreen(); listenRoom();
  });
}

function showWaitingScreen() {
  showScreen('waitingScreen');
  document.getElementById('roomKeyDisplay').textContent = roomKey;
  document.getElementById('waitingTitle').textContent = isHost ? '参加者を待っています...' : 'ホストの開始を待っています...';
  document.getElementById('startGameBtn').style.display = isHost ? 'inline-block' : 'none';
}

function leaveRoom() {
  if (roomUnsubscribe) { roomUnsubscribe(); roomUnsubscribe = null; }
  window._remove(window._ref(window._db, `quiz_rooms/${roomKey}/players/${myId}`));
  backToTitle();
}

function hostStartGame() {
  if (Object.keys(players).length < 2) { alert('2人以上必要です'); return; }
  window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), {
    phase: 'playing', currentQIndex: 0, revealIndex: 1,
    buzzerId: '', revealStopped: false,
    answers: {}, resting: {}, locked: {}, surrendered: {}, nextReady: {}
  });
}

function listenRoom() {
  if (roomUnsubscribe) { roomUnsubscribe(); roomUnsubscribe = null; }
  window._onDisconnect(window._ref(window._db, `quiz_rooms/${roomKey}/disconnected/${myId}`)).set(true);
  roomUnsubscribe = window._onValue(window._ref(window._db, `quiz_rooms/${roomKey}`), snap => {
    const d = snap.val();
    if (!d) return;
    players = d.players || {};
    if (d.phase === 'waiting')  { updateWaitingList(d); return; }
    if (d.phase === 'playing')  { showScreen('gameScreen'); document.getElementById('resultOverlay').classList.remove('show'); updateGameScreen(d); return; }
    if (d.phase === 'result')   { showScreen('gameScreen'); showResultOverlay(d); return; }
    if (d.phase === 'final')    { document.getElementById('resultOverlay').classList.remove('show'); showFinalScreen(d); return; }
  });
}

function updateWaitingList(d) {
  const list = document.getElementById('playerListWaiting');
  list.innerHTML = '';
  Object.values(d.players || {}).forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `<div class="player-dot"></div>${p.name}`;
    list.appendChild(li);
  });
}

function updateGameScreen(d) {
  const qi = d.currentQIndex || 0;
  const qs = d.questions || [];
  if (qi >= qs.length) return;
  const q = qs[qi];

  document.getElementById('qNumBadge').textContent = `Q${qi + 1} / ${qs.length}`;
  document.getElementById('onlineCatTag').textContent = q.cat || '';

  const revealIdx = d.revealIndex || 1;
  document.getElementById('onlineQuestionText').textContent = q.q.substring(0, revealIdx);

  const buzzer = d.buzzerId || '';
  const resting = d.resting || {};
  const locked = d.locked || {};
  const surrendered = d.surrendered || {};
  const isBuzzerMe = buzzer === myId;

  const banner = document.getElementById('buzzBanner');
  if (!buzzer) { banner.className = 'buzz-banner nobody'; banner.textContent = '問題文を読んでいます...'; }
  else if (isBuzzerMe) { banner.className = 'buzz-banner me'; banner.textContent = ' あなたが早押し！'; }
  else { const bn = players[buzzer]?.name || buzzer; banner.className = 'buzz-banner other'; banner.textContent = ` ${bn} が早押し！！`; }

  updatePlayerStatusBoxes(d, q);
  renderActionArea(d, q, buzzer, resting, locked, surrendered, isBuzzerMe);
  updateAnswersLog(d, q);

  if (isHost && !d.revealStopped && revealIdx < q.q.length) {
    if (!charRevealInterval) {
      charRevealInterval = setInterval(() => {
        window._get(window._ref(window._db, `quiz_rooms/${roomKey}`)).then(snap => {
          const cur = snap.val();
          if (!cur || cur.phase !== 'playing' || cur.revealStopped) { stopCharReveal(); return; }
          const curReveal = cur.revealIndex || 1;
          if (curReveal < q.q.length) {
            window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { revealIndex: curReveal + 1 });
          } else { stopCharReveal(); }
        });
      }, 750);
    }
  } else if (d.revealStopped || revealIdx >= q.q.length) { stopCharReveal(); }

  if (isHost) {
    const pIds = Object.keys(players);
    const allSurrendered = pIds.length > 0 && pIds.every(id => surrendered[id]);
    if (allSurrendered) { stopCharReveal(); window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { phase: 'result' }); return; }
    const allResting = pIds.length > 0 && pIds.every(id => resting[id] || surrendered[id]);
    if (allResting) { stopCharReveal(); window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { phase: 'result' }); return; }
  }
}

function renderActionArea(d, q, buzzer, resting, locked, surrendered, isBuzzerMe) {
  const area = document.getElementById('actionArea');
  const myResting = resting[myId];
  const myLocked = locked[myId];
  const mySurrendered = surrendered[myId];

  if (mySurrendered) { area.innerHTML = `<div class="surrendered-notice">🏳️ 降参しました。他の人の結果を待っています...</div>`; return; }
  if (myResting) { area.innerHTML = `<div class="locked-notice">🔒 不正解... 相手の結果を待っています</div>`; return; }
  if (isBuzzerMe) {
    area.innerHTML = `<div class="answer-card"><div style="font-size:13px;color:var(--green);font-weight:700;margin-bottom:8px;"> 回答してください</div><div class="answer-input-row"><input id="onlineAnswerInput" placeholder="答えを入力..." maxlength="30" autocomplete="off"><button onclick="submitOnlineAnswer()">回答</button></div></div>`;
    setTimeout(() => {
      const inp = document.getElementById('onlineAnswerInput');
      if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitOnlineAnswer(); }); }
    }, 50);
    return;
  }
  if (buzzer) { const bn = players[buzzer]?.name || buzzer; area.innerHTML = `<div class="waiting-answer-notice">⏳ ${bn} が回答中... 待ってください</div>`; return; }
  const canBuzz = !myResting && !myLocked;
  area.innerHTML = `
    <button class="buzz-btn" id="buzzBtn" onclick="pressBuzz()" ${canBuzz ? '' : 'disabled'}> 早押し！</button>
    <div class="surrender-row"><button class="surrender-btn" onclick="pressSurrender()"> 降参する</button></div>`;
}

function updatePlayerStatusBoxes(d, q) {
  const pIds = Object.keys(players);
  const container = document.getElementById('playersStatusCard');
  container.innerHTML = pIds.map(id => {
    const p = players[id];
    let statusText = '待機', statusClass = '';
    const ans = d.answers?.[id];
    const isCorrect = ans && q.a.includes(ans);
    if (d.surrendered?.[id]) { statusText = '🏳降参'; }
    else if (isCorrect) { statusText = '✅正解'; statusClass = 'green'; }
    else if (d.resting?.[id]) { statusText = d.locked?.[id] ? 'ロック' : '❌ミス'; statusClass = d.locked?.[id] ? 'orange' : 'red'; }
    else if (d.buzzerId === id) { statusText = '入力中'; statusClass = 'red'; }
    return `<div class="player-status-box"><div class="psb-name">${p.name}</div><div class="psb-score">${p.score || 0}pt</div><div class="psb-status ${statusClass}">${statusText}</div></div>`;
  }).join('');
}

function updateAnswersLog(d, q) {
  const answers = d.answers || {};
  const surrendered = d.surrendered || {};
  const container = document.getElementById('answersLog');
  const entries = [];
  Object.entries(answers).forEach(([id, ans]) => {
    if (!ans) return;
    const isCorrect = q.a.includes(ans);
    entries.push({ name: players[id]?.name || id, ans, isCorrect, isSurrender: false });
  });
  Object.keys(surrendered).forEach(id => {
    if (surrendered[id] && !answers[id]) entries.push({ name: players[id]?.name || id, ans: '降参', isSurrender: true });
  });
  if (entries.length === 0) { container.innerHTML = '<div style="font-size:12px;color:var(--gray-mid);">まだ回答はありません</div>'; return; }
  container.innerHTML = entries.map(e => {
    if (e.isSurrender) return `<div class="answer-log-row"><span class="log-name">${e.name}</span><span class="log-ans">🏳 降参</span><span class="log-mark"></span></div>`;
    const mark = e.isCorrect ? '⭕' : '❌';
    return `<div class="answer-log-row"><span class="log-name">${e.name}</span><span class="log-ans">「${e.ans}」</span><span class="log-mark">${mark}</span></div>`;
  }).join('');
}

function pressBuzz() {
  const btn = document.getElementById('buzzBtn');
  if (btn) btn.disabled = true;
  window._get(window._ref(window._db, `quiz_rooms/${roomKey}`)).then(snap => {
    const d = snap.val();
    if (!d || d.phase !== 'playing') return;
    if (d.buzzerId) return;
    if (d.resting?.[myId] || d.locked?.[myId] || d.surrendered?.[myId]) return;
    window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { buzzerId: myId, revealStopped: true });
  });
}

function pressSurrender() {
  if (!confirm('降参しますか？')) return;
  window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { [`surrendered/${myId}`]: true });
}

function submitOnlineAnswer() {
  const inp = document.getElementById('onlineAnswerInput');
  if (!inp) return;
  const ans = inp.value.trim();
  if (!ans) return;
  inp.disabled = true;
  window._get(window._ref(window._db, `quiz_rooms/${roomKey}`)).then(snap => {
    const d = snap.val();
    if (!d || d.phase !== 'playing') return;
    const qi = d.currentQIndex || 0;
    const q = d.questions?.[qi];
    if (!q) return;
    const isCorrect = q.a.includes(ans);
    if (isCorrect) {
      const newScore = (players[myId]?.score || 0) + 1;
      window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { [`answers/${myId}`]: ans, [`players/${myId}/score`]: newScore, phase: 'result' });
    } else {
      const pIds = Object.keys(players);
      const updates = { [`answers/${myId}`]: ans, [`resting/${myId}`]: true, [`locked/${myId}`]: true, buzzerId: '', revealStopped: false };
      pIds.forEach(id => { if (id !== myId) updates[`locked/${id}`] = false; });
      window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), updates);
    }
  });
}

function showResultOverlay(d) {
  stopCharReveal();
  const qi = d.currentQIndex || 0;
  const q = d.questions?.[qi];
  if (!q) return;
  document.getElementById('resultQuestionFull').textContent = `問題：${q.q}`;
  const answers = d.answers || {};
  const pIds = Object.keys(players);
  const correctIds = pIds.filter(id => answers[id] && q.a.includes(answers[id]));
  const myCorrect = q.a.includes(answers[myId]);
  let statusText;
if (myCorrect) {
  statusText = '正解！';
} else if (correctIds.length > 0) {
  statusText = `${players[correctIds[0]]?.name || correctIds[0]} が正解`;
} else if (Object.keys(d.surrendered || {}).length === Object.keys(players).length) {
  statusText = '全員降参...';
} else {
  statusText = '全員不正解...';
}
document.getElementById('resultStatus').textContent = statusText;
  document.getElementById('resultStatus').className = 'result-status ' + (myCorrect ? 'success' : 'fail');
  document.getElementById('resultAnswer').textContent = `答え：「${q.a[0]}」`;
  document.getElementById('resultWinner').textContent = correctIds.length > 0 ? `正解者：${correctIds.map(id => players[id]?.name || id).join('、')} ` : '今回は全員不正解でした';
  const scoresHtml = [...pIds].sort((a, b) => (players[b]?.score || 0) - (players[a]?.score || 0)).map(id => `<div class="result-score-row"><span class="result-score-name">${players[id]?.name || id}</span><span class="result-score-num">${players[id]?.score || 0}点</span></div>`).join('');
  document.getElementById('resultScores').innerHTML = scoresHtml;
  const nextBtn = document.getElementById('nextQuestionBtn');
  nextBtn.disabled = false; nextBtn.textContent = '次の問題へ';
  document.getElementById('resultWaiting').textContent = '';
  document.getElementById('resultOverlay').classList.add('show');
  if (isHost && d.nextReady) { if (pIds.every(id => d.nextReady[id])) { proceedToNext(d); return; } }
  if (d.nextReady?.[myId]) {
    nextBtn.disabled = true; nextBtn.textContent = '待機中...';
    const cnt = Object.values(d.nextReady).filter(Boolean).length;
    document.getElementById('resultWaiting').textContent = `${cnt} / ${pIds.length} 人が準備完了`;
  }
}

function pressNextQuestion() {
  window._update(window._ref(window._db, `quiz_rooms/${roomKey}/nextReady`), { [myId]: true });
  const btn = document.getElementById('nextQuestionBtn');
  btn.disabled = true; btn.textContent = '待機中...';
}

function proceedToNext(d) {
  if (!isHost) return;
  const qi = d.currentQIndex || 0;
  const total = d.questions?.length || totalQuestions;
  if (qi + 1 >= total) { window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { phase: 'final' }); }
  else { window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { phase: 'playing', currentQIndex: qi + 1, revealIndex: 1, revealStopped: false, buzzerId: '', answers: {}, resting: {}, locked: {}, surrendered: {}, nextReady: {} }); }
}

function showFinalScreen(d) {
  stopCharReveal();
  showScreen('finalScreen');
  document.getElementById('resultOverlay').classList.remove('show');
  const pIds = Object.keys(players);
  const sorted = [...pIds].sort((a, b) => (players[b]?.score || 0) - (players[a]?.score || 0));
  const winner = players[sorted[0]];
  document.getElementById('finalWinnerBadge').innerHTML = winner ? `<div class="final-winner-badge"> ${winner.name} の勝利！</div>` : '';
  document.getElementById('finalScoreTable').innerHTML = sorted.map((id, i) => `<tr><td class="final-rank">${i + 1}位</td><td class="final-name">${players[id]?.name || id}</td><td class="final-pts">${players[id]?.score || 0}点</td></tr>`).join('');
  const playAgainBtn = document.getElementById('playAgainBtn');
  if (!isHost) { playAgainBtn.style.display = 'none'; }
  document.getElementById('finalWaitMsg').textContent = isHost ? '' : 'ホストが次のゲームを開始するのを待っています...';
}

function playAgain() {
  if (!isHost) return;
  const questions = selectQuestions(totalQuestions);
  const scoreReset = {};
  Object.keys(players).forEach(id => { scoreReset[`players/${id}/score`] = 0; });
  window._update(window._ref(window._db, `quiz_rooms/${roomKey}`), { ...scoreReset, phase: 'waiting', currentQIndex: 0, revealIndex: 1, revealStopped: false, buzzerId: '', questions: questions.map(q => ({ q: q.q, a: q.a, cat: q.cat })), answers: {}, resting: {}, locked: {}, surrendered: {}, nextReady: {} });
  showWaitingScreen();
}

function stopCharReveal() {
  if (charRevealInterval) { clearInterval(charRevealInterval); charRevealInterval = null; }
}
</script>
